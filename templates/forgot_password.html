<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Forgot Password — Nails on Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="{{ url_for('index') }}" class="auth-brand">✦ Nails on Board</a>
    <div style="text-align:center;font-size:2.5rem;margin:8px 0">🔐</div>
    <h2>Forgot Password?</h2>
    <p class="auth-sub">Enter your email and we'll send a reset link</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" class="auth-form">
      <div class="form-group"><label>Email Address *</label><input type="email" name="email" required autofocus placeholder="you@email.com"/></div>
      <button type="submit" class="btn btn-primary full-width">Send Reset Link 📧</button>
    </form>
    <div class="auth-switch">Remember your password? <a href="{{ url_for('customer_login') }}">Login</a></div>
    <a href="{{ url_for('index') }}" class="auth-back">← Back to Home</a>
  </div>
</div>
<script>(function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('theme')||'light'); })();</script>
</body></html>
