{% extends "admin/base_admin.html" %}
{% block title %}Add Product — Admin{% endblock %}
{% block page_title %}Add New Product{% endblock %}
{% block content %}
<div class="admin-form-card">
  <form method="POST" enctype="multipart/form-data" class="admin-form">
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" name="name" required placeholder="e.g. Rose Gold Gel Kit" />
      </div>
      <div class="form-group">
        <label>Category *</label>
        <input type="text" name="category" required placeholder="e.g. Gel, Acrylic, Art Supplies" />
      </div>
    </div>
    <div class="form-group full">
      <label>Description *</label>
      <textarea name="description" required rows="4" placeholder="Describe this product in detail..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (₹) *</label>
        <input type="number" name="price" step="0.01" min="0" required placeholder="999.00" />
      </div>
      <div class="form-group">
        <label>Product Photo</label>
        <input type="file" name="image" accept="image/*" class="file-input" />
      </div>
    </div>
    <div class="form-group checkbox-group">
      <label><input type="checkbox" name="in_stock" checked /> In Stock</label>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin_products') }}" class="btn-cancel">Cancel</a>
      <button type="submit" style="background:#c4687a;color:#ffffff!important;padding:10px 20px;border-radius:8px;font-family:Jost,sans-serif;font-size:.88rem;font-weight:600;text-decoration:none;display:inline-block;border:none;cursor:pointer">Add Product ✦</button>
    </div>
  </form>
</div>
{% endblock %}
