{% extends "admin/base_admin.html" %}
{% block title %}Edit Product — Admin{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block content %}
<div class="admin-form-card">
  <form method="POST" enctype="multipart/form-data" class="admin-form">
    {% if product.image_filename %}
    <div class="current-image">
      <label>Current Photo</label>
      <img src="{{ url_for('static', filename='uploads/nails/' + product.image_filename) }}" alt="Current" />
    </div>
    {% endif %}
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" name="name" required value="{{ product.name }}" />
      </div>
      <div class="form-group">
        <label>Category *</label>
        <input type="text" name="category" required value="{{ product.category }}" />
      </div>
    </div>
    <div class="form-group full">
      <label>Description *</label>
      <textarea name="description" required rows="4">{{ product.description }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price (₹) *</label>
        <input type="number" name="price" step="0.01" min="0" required value="{{ product.price }}" />
      </div>
      <div class="form-group">
        <label>Replace Photo (optional)</label>
        <input type="file" name="image" accept="image/*" class="file-input" />
      </div>
    </div>
    <div class="form-group checkbox-group">
      <label><input type="checkbox" name="in_stock" {% if product.in_stock %}checked{% endif %} /> In Stock</label>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('admin_products') }}" class="btn-cancel">Cancel</a>
      <button type="submit" style="background:#c4687a;color:#ffffff!important;padding:10px 20px;border-radius:8px;font-family:Jost,sans-serif;font-size:.88rem;font-weight:600;text-decoration:none;display:inline-block;border:none;cursor:pointer">Save Changes ✦</button>
    </div>
  </form>
</div>
{% endblock %}
