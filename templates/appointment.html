{% extends "base.html" %}
{% block title %}Book Appointment — Nails on Board{% endblock %}
{% block content %}
<section class="page-hero"><h1>Book Appointment</h1><p>Let our experts create your perfect nails</p></section>
<section class="form-section">
  <div class="form-card">
    <div class="services-preview">
      {% for s in services %}<div class="service-chip">💅 {{ s }}</div>{% endfor %}
    </div>
    <form method="POST" class="styled-form">
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" name="name" required value="{{ customer.name if customer else '' }}" placeholder="Your name"/></div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" required value="{{ customer.email if customer else '' }}" placeholder="you@email.com"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone *</label><input type="tel" name="phone" required value="{{ customer.phone if customer else '' }}" placeholder="+91 XXXXX XXXXX"/></div>
        <div class="form-group"><label>Service *</label>
          <select name="service" required>
            <option value="">Select a service...</option>
            {% for s in services %}<option>{{ s }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Preferred Date *</label>
          <input type="date" name="date" required id="apptDate"/>
        </div>
        <div class="form-group"><label>Preferred Time *</label>
          <select name="time" required>
            <option value="">Select time...</option>
            {% for t in time_slots %}<option>{{ t }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group full"><label>Special Notes</label><textarea name="notes" rows="3" placeholder="Design ideas, allergies, special requests..."></textarea></div>
      <button type="submit" class="btn btn-primary btn-lg full-width">Request Appointment ✦</button>
    </form>
  </div>
</section>
<script>
const blockedDates = {{ blocked_dates | tojson }};
const dateInput = document.getElementById('apptDate');
if(dateInput){
  const today = '{{ min_date }}';
  dateInput.min = today;
  dateInput.addEventListener('change', function(){
    if(blockedDates.includes(this.value)){
      alert('Sorry, we are not available on this date. Please choose another date.');
      this.value = '';
    }
  });
}
</script>
{% endblock %}
